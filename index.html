<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Meu site</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: 'Arial', sans-serif;
			background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Standaard_Nederlandsche_SS.svg/2560px-Standaard_Nederlandsche_SS.svg.png') fixed center;
			background-size: cover;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			position: relative;
		}
		
		#background-layer {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background-color: rgba(0, 0, 0, 0.7);
			z-index: -1;
		}

		h1 {
			font-size: 17em;
			font-weight: bold;
			margin: 0;
			text-align: center;
			color: white;
			text-shadow: 0px 0px 10px rgba(0, 0, 0, 0.8);
		}

		h2 {
			font-size: 1.5em;
			margin: 0;
			text-align: center;
			margin-top: 0.5em;
			color: #ccc;
		}

		.box {
			background-color: #333;
			color: white;
			padding: 1em;
			border-radius: 5px;
			font-size: 1.5em;
			margin: 1em;
			cursor: pointer;
			text-align: center;
			position: relative;
			z-index: 1;
		}

		.box:hover {
			background-color: #666;
		}

		.box a {
			color: white;
			text-decoration: none;
		}

		.rct {
			background-color: rgba(255, 255, 255, 0.7);
			padding: 0.5em;
			border-radius: 5px;
			position: absolute;
			bottom: 1em;
			left: 50%;
			transform: translateX(-50%);
			z-index: 1;
		}

		@media screen and (max-width: 768px) {
			h1 {
				font-size: 10em;
			}

			h2 {
				font-size: 1em;
			}

			.box {
				font-size: 1em;
			}

			.rct {
				font-size: 1em;
			}
		}
	</style>
</head>
<body>
	<div id="background-layer"></div>
	<h1>𝐖𝐀𝐅𝐅𝐄𝐍</h1>
	<h2>aaa</h2>
