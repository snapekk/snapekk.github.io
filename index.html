<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Meu site</title>
	<style>
		body {	
			color: white;
			font-family: 'Arial', sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			padding: 0;
			background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Standaard_Nederlandsche_SS.svg/2560px-Standaard_Nederlandsche_SS.svg.png') fixed center;
			background-size: cover;
		}

		h1 {
			font-size: 7vw;
			font-weight: bold;
			margin: 0;
			text-align: center;
			animation: text-animation 10s ease-in-out infinite alternate;
		}

		h2 {
			font-size: 4vw;
			margin: 0;
			text-align: center;
			margin-top: 0.5em;
			color: #ccc;
		}

		.box {
			background-color: #333;
			color: white;
			padding: 1em;
			border-radius: 5px;
			font-size: 4vw;
			margin: 1em;
			cursor: pointer;
		}

		.box:hover {
			background-color: #666;
		}

		.box a {
			color: white;
			text-decoration: none;
		}

		@keyframes text-animation {
			0% {
				color: #8B0000;
			}
			50% {
				color: #FF0000;
			}
			100% {
				color: #8B0000;
			}
		}
	</style>
</head>
<body>
	<h1>Waffen</h1>
	<h2>aaa</h2>

		</div>
		<div class="box" style="position: absolute; top: 0; right: 0;">

		</div>
	</div>
</body>
</html>
