<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Obras - Elektro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;900&display=swap');
        :root { --hour-w: 35px; --day-w: calc(var(--hour-w) * 24); --label-w: 180px; --header-h: 60px; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc; height: 100vh; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; color: #1e293b;
        }

        /* DARK MODE - CORES E CONTRASTE */
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .dark .bg-white { background-color: #1e293b !important; }
        .dark header, .dark .sidebar-container, .dark .dashboard-row { border-color: #334155 !important; }
        .dark .gantt-corner { background: #0f172a; border-color: #334155; }
        .dark .gantt-header-timeline { background: #1e293b; border-color: #334155; }
        .dark .day-info { background: #334155; color: #cbd5e1; border-color: #475569; }
        .dark .hour-tick { border-color: #334155; color: #64748b; }
        
        /* FIX DO MERGE VISUAL */
        .gantt-label-cell { height: 40px; display: flex; align-items: center; padding: 0 16px; font-size: 12px; font-weight: 700; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; background: #f8fafc; z-index: 85; }
        .dark .gantt-label-cell { background-color: #1e293b !important; border-bottom: 1px solid #334155 !important; color: #94a3b8 !important; }

        .gantt-data-row { height: 40px; position: relative; border-bottom: 1px solid #f1f5f9; background-image: linear-gradient(to right, #cbd5e1 1.5px, transparent 1.5px), linear-gradient(to right, #f1f5f9 1px, transparent 1px); background-size: var(--day-w) 100%, var(--hour-w) 100%; }
        .dark .gantt-data-row { background-color: #111827 !important; border-bottom: 1px solid #334155 !important; background-image: linear-gradient(to right, #334155 1.5px, transparent 1.5px), linear-gradient(to right, #1e293b 1px, transparent 1px); }

        @keyframes soft-pulse { 0% { transform: scale(1); outline: 0px solid transparent; } 50% { transform: scale(1.02); outline: 3px solid #3b82f6; } 100% { transform: scale(1); outline: 0px solid transparent; } }
        .pulse-active { animation: soft-pulse 0.8s ease-in-out 3; z-index: 50 !important; position: relative; }

        .sidebar-card { padding: 16px; border-bottom: 1px solid #f1f5f9; position: relative; cursor: pointer; border-left-width: 5px; }
        .dark .sidebar-card { border-bottom-color: #334155; }
        .card-pending { border-left-color: #f59e0b; }
        .card-finished { border-left-color: #10b981; }

        .task-bar { position: absolute; height: 32px; top: 4px; border-radius: 8px; display: flex; align-items: center; padding: 0 12px; font-size: 11px; font-weight: 800; color: #fff !important; z-index: 20; border: 1px solid rgba(0,0,0,0.15); overflow: hidden; cursor: pointer; }
        .task-orange { background-color: #f59e0b; }
        .task-purple { background-color: #8b5cf6; }
        .task-red    { background-color: #10b981; }

        .finder-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid rgba(255,255,255,0.1); padding: 8px 24px; border-radius: 16px; display: flex; align-items: center; gap: 20px; box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.4); z-index: 400; }
        .modal-input { background-color: #f8fafc !important; color: #1e293b !important; border: 1px solid #e2e8f0 !important; padding: 12px !important; font-weight: 600 !important; border-radius: 10px !important; }
        .dark .modal-input { background-color: #0f172a !important; color: #f1f5f9 !important; border-color: #334155 !important; }
        .team-toggle { padding: 10px 16px; border-radius: 10px; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; font-size: 12px; font-weight: 700; cursor: pointer; }
        .team-toggle.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    </style>
</head>
<body class="light">

    <header class="bg-white h-16 flex items-center justify-between px-6 z-[110] border-b border-slate-200">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-400"><i data-lucide="menu"></i></button>
            <div class="bg-orange-500 p-2 rounded-xl text-white shadow-sm"><i data-lucide="hard-hat"></i></div>
            <div>
                <h1 class="text-xl font-bold dark:text-white leading-none mb-1">Quintiq Elektro</h1>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Bertioga • SP</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="syncDatabase()" class="text-slate-500 dark:text-slate-400 font-bold text-[10px] uppercase flex items-center gap-1 bg-slate-100 dark:bg-slate-800 px-3 py-2 rounded-lg">
                <i data-lucide="folder-sync" class="w-3 h-3"></i> Sincronizar DB
            </button>
            <button onclick="toggleModal('settings')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-400"><i data-lucide="settings"></i></button>
            <button onclick="scrollToToday()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-[10px] uppercase">HOJE</button>
            <button onclick="toggleModal('add')" class="bg-slate-800 dark:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold text-xs uppercase">LANÇAR LOTE</button>
        </div>
    </header>

    <div class="app-container">
        <aside id="sidebar" class="sidebar-container bg-white w-[320px] border-r border-slate-200 dark:border-slate-700">
            <div class="p-4 border-b border-slate-100 dark:border-slate-700">
                <div class="flex justify-between items-center mb-4"><span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest" id="sidebar-count">0 OBRAS</span></div>
                <div class="flex gap-2 overflow-x-auto pb-1" id="filter-bubbles-container"></div>
            </div>
            <div id="sidebar-list" class="sidebar-scroll overflow-y-auto"></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-white">
            <div class="bg-white border-b border-slate-200 dark:border-slate-700 shadow-sm">
                <div class="dashboard-row"><div class="row-label">Reprogramar</div><div id="row-reprogram" class="row-items overflow-x-auto flex gap-2 p-2"></div></div>
                <div class="dashboard-row"><div class="row-label">Apontadas</div><div id="row-finished" class="row-items overflow-x-auto flex gap-2 p-2"></div></div>
                <div class="dashboard-row"><div class="row-label">Pendentes</div><div id="row-pending" class="row-items overflow-x-auto flex gap-2 p-2"></div></div>
            </div>
            <div class="gantt-viewport flex-1 overflow-auto" id="gantt-scroll-parent">
                <div class="gantt-container" style="display: grid; grid-template-columns: var(--label-w) auto;">
                    <div class="gantt-corner sticky top-0 left-0 z-[100] bg-[#1e293b] text-white flex items-center px-4 font-bold text-[11px] uppercase">Equipe / Bloco</div>
                    <div class="gantt-header-timeline sticky top-0 z-[90] flex bg-slate-50 border-b h-[60px]" id="timeline-header"></div>
                    <div class="gantt-label-column sticky left-0 z-[80] bg-slate-50 w-[var(--label-w)] border-r" id="timeline-labels"></div>
                    <div class="gantt-data-grid relative" id="timeline-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="finder-dock">
        <input type="date" id="finder-date" onchange="scrollToDate(this.value)" class="bg-transparent border-none text-white text-[13px] font-bold outline-none cursor-pointer">
        <div class="w-px h-6 bg-slate-700"></div>
        <div class="relative flex items-center">
            <i data-lucide="search" class="w-4 h-4 text-slate-500 mr-2"></i>
            <input type="text" id="finder-work" oninput="handleWorkSearch(this.value)" placeholder="Localizar obra..." class="bg-transparent border-none text-white text-[14px] font-bold outline-none w-64">
            <div id="search-results" class="search-results absolute bottom-full left-0 w-full bg-white dark:bg-slate-900 border rounded-lg mb-2 shadow-xl hidden"></div>
        </div>
        <div id="current-date-display" class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter ml-2"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[600] p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-[28px] w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] shadow-2xl border border-slate-200 dark:border-slate-700">
            <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                <h3 id="modal-title" class="text-xl font-bold dark:text-white uppercase italic">Lançamento</h3>
                <button onclick="closeModal()"><i data-lucide="x"></i></button>
            </div>
            
            <div id="modal-settings-content" class="p-8 hidden space-y-6">
                <div class="bg-slate-50 dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700">
                    <h4 class="text-sm font-black text-slate-400 mb-4 uppercase">Aparência</h4>
                    <button onclick="toggleDarkMode()" class="w-full flex justify-between items-center bg-white dark:bg-slate-900 p-4 rounded-xl border dark:border-slate-700">
                        <span class="font-bold dark:text-slate-200">Tema Escuro</span>
                        <div class="w-12 h-6 bg-slate-200 dark:bg-blue-500 rounded-full relative"><div class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 dark:left-7 transition-all"></div></div>
                    </button>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 text-center">
                    <button onclick="exportData()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl flex justify-center gap-2"><i data-lucide="download"></i> EXPORTAR BACKUP MANUAL</button>
                </div>
            </div>

            <div id="modal-main-content" class="p-8 overflow-y-auto flex-1 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2"><label class="text-[11px] font-bold text-slate-400 uppercase mb-2 block">Código</label><input type="text" id="m-code" class="w-full modal-input uppercase"></div>
                    <div class="col-span-2"><label class="text-[11px] font-bold text-slate-400 uppercase mb-3 block">Equipe</label><div id="team-toggles-container" class="flex flex-wrap gap-3"></div></div>
                    <div><label class="text-[11px] font-bold text-slate-400 uppercase mb-2 block">Data</label><input type="date" id="m-date" class="w-full modal-input"></div>
                    <div><label class="text-[11px] font-bold text-slate-400 uppercase mb-2 block">Qtd US</label><input type="number" id="m-us" class="w-full modal-input"></div>
                    <div class="flex gap-4 col-span-2">
                        <div class="flex-1"><label class="text-[11px] font-bold text-slate-400 uppercase mb-2 block">Início</label><input type="time" id="m-start" class="w-full modal-input"></div>
                        <div class="flex-1"><label class="text-[11px] font-bold text-slate-400 uppercase mb-2 block">Fim</label><input type="time" id="m-end" class="w-full modal-input"></div>
                    </div>
                    <div class="col-span-2"><label class="text-[11px] font-bold text-slate-400 uppercase mb-2 block">Notas</label><textarea id="m-comment" class="w-full modal-input h-28 resize-none"></textarea></div>
                </div>
                <button id="modal-primary-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl">ADICIONAR À FILA</button>
                <div id="batch-table-container" class="border dark:border-slate-800 rounded-2xl overflow-hidden mt-4">
                    <table class="w-full"><thead class="bg-slate-50 dark:bg-slate-800 text-[10px] uppercase text-slate-400 font-bold"><tr><th class="p-4 text-left">Obra</th><th class="p-4 text-left">Equipe</th><th class="p-4 text-right">Ação</th></tr></thead><tbody id="temp-table" class="text-sm"></tbody></table>
                </div>
            </div>
            <div class="p-8 bg-slate-50 dark:bg-slate-800 border-t dark:border-slate-700 flex gap-4"><button onclick="closeModal()" class="flex-1 font-bold text-slate-400 uppercase text-xs">Fechar</button><button id="modal-confirm-btn" onclick="finalize()" disabled class="flex-[2] bg-slate-800 dark:bg-blue-500 text-white py-4 rounded-2xl font-bold text-xs uppercase">Gravar</button></div>
        </div>
    </div>

    <div id="modal-overview" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[700] p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-[40px] w-full max-w-md overflow-hidden shadow-2xl border dark:border-slate-800">
            <div class="bg-[#1e293b] p-10 text-white relative">
                <button onclick="closeOverview()" class="absolute top-8 right-8 text-slate-400"><i data-lucide="x" class="w-8 h-8"></i></button>
                <div class="flex items-center gap-2 mb-3"><div id="ov-status-dot" class="w-3 h-3 rounded-full bg-orange-500"></div><span id="ov-status-text" class="text-[11px] font-bold uppercase text-slate-400"></span></div>
                <h2 id="ov-code" class="text-3xl font-bold italic tracking-tighter uppercase leading-none"></h2>
            </div>
            <div class="p-8 space-y-8">
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl text-center flex flex-col"><span class="text-[9px] font-bold text-slate-400 uppercase">Equipe</span><span id="ov-teams-tags" class="text-xs font-bold dark:text-slate-300"></span></div>
                    <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl text-center flex flex-col"><span class="text-[9px] font-bold text-slate-400 uppercase">Janela</span><span id="ov-time" class="text-xs font-bold dark:text-slate-300"></span></div>
                    <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl text-center flex flex-col"><span class="text-[9px] font-bold text-slate-400 uppercase">US</span><span id="ov-us" class="text-xs font-bold text-blue-600 dark:text-blue-400"></span></div>
                </div>
                <div id="ov-date" class="bg-blue-50 dark:bg-blue-900/30 p-5 rounded-2xl text-center font-bold text-blue-900 dark:text-blue-200 uppercase"></div>
                <div class="bg-slate-50 dark:bg-slate-800 p-6 rounded-2xl min-h-[140px]"><p id="ov-comment" class="text-sm italic dark:text-slate-400"></p></div>
                <div class="grid grid-cols-3 gap-3"><button id="ov-edit-btn" class="bg-slate-100 dark:bg-slate-800 dark:text-slate-300 py-4 rounded-2xl font-bold text-[10px] uppercase">EDITAR</button><button id="ov-repro-btn" class="bg-orange-100 dark:bg-orange-900/30 text-orange-800 py-4 rounded-2xl font-bold text-[10px] uppercase text-orange-400">REPROG.</button><button id="ov-toggle-btn" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase text-[10px]"></button></div>
            </div>
        </div>
    </div>

    <div id="modal-status" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[800] p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-[40px] w-full max-w-sm overflow-hidden shadow-2xl border dark:border-slate-700">
            <div class="p-10 space-y-6 text-center">
                <h3 id="status-modal-title" class="text-2xl font-bold dark:text-white uppercase tracking-tight">Confirmar</h3>
                <p id="status-modal-desc" class="text-[12px] font-bold text-slate-500 uppercase tracking-widest"></p>
                <textarea id="status-m-comment" placeholder="Nota final..." class="w-full modal-input h-32 text-center"></textarea>
                <div class="flex gap-4"><button onclick="closeStatusModal()" class="flex-1 font-bold text-slate-400 text-xs uppercase">Voltar</button><button id="status-confirm-btn" class="flex-[2] bg-blue-600 text-white py-5 rounded-[20px] font-bold uppercase text-xs">Confirmar</button></div>
            </div>
        </div>
    </div>

    <script>
        const TEAMS = ["BB22", "BB30", "BB40", "BB45", "BB99"];
        const START_TS = new Date(2025, 0, 1).getTime(); 
        const END_TS = new Date(2028, 11, 31).getTime();
        const MS_PER_DAY = 86400000;
        const WEEKDAYS = ["DOMINGO", "SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];
        
        let works = JSON.parse(localStorage.getItem('obras_quintiq_blindada')) || [];
        let fileHandle = null; let editingId = null; let tempItems = []; let activeFilter = 'all'; let collapsedDates = new Set();
        let currentZoom = 35;

        function toggleDarkMode() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
        async function syncDatabase() { try { [fileHandle] = await window.showOpenFilePicker({ types: [{ description: 'JSON DB', accept: { 'application/json': ['.json'] } }] }); const file = await fileHandle.getFile(); const contents = await file.text(); works = contents ? JSON.parse(contents) : []; saveData(); render(); alert("Sincronizado!"); } catch (e) {} }
        function exportData() { const blob = new Blob([JSON.stringify(works, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `backup_${Date.now()}.json`; a.click(); }
        async function saveData() { localStorage.setItem('obras_quintiq_blindada', JSON.stringify(works)); if (fileHandle) { try { const writable = await fileHandle.createWritable(); await writable.write(JSON.stringify(works, null, 2)); await writable.close(); } catch (e) {} } }

        function isoToBR(iso) { if(!iso) return ''; const [y, m, d] = iso.split('-'); return `${d}/${m}/${y}`; }
        function getDaysSinceStart(iso) { if(!iso) return 0; const [y, m, d] = iso.split('-').map(Number); return Math.round((new Date(y, m-1, d).getTime() - START_TS)/MS_PER_DAY); }
        function getISODateLocal() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            lucide.createIcons(); applyZoom();
            const fDate = document.getElementById('finder-date'); if(fDate) fDate.value = getISODateLocal();
            const n = new Date(); document.getElementById('current-date-display').innerText = `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`;
            setTimeout(scrollToToday, 500);
        }

        window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('collapsed'); };
        window.scrollToToday = function() { scrollToDate(getISODateLocal()); };

        function applyZoom() {
            document.documentElement.style.setProperty('--hour-w', `${currentZoom}px`);
            const header = document.getElementById('timeline-header'); header.innerHTML = '';
            const totalDays = Math.floor((END_TS - START_TS)/MS_PER_DAY)+1;
            for (let i = 0; i < totalDays; i++) {
                const dObj = new Date(START_TS + (i * MS_PER_DAY));
                const group = document.createElement('div'); group.className = 'day-group flex-shrink-0';
                group.innerHTML = `<div class="day-info h-[30px] flex items-center justify-center font-bold text-[10px] border-b border-r">${WEEKDAYS[dObj.getDay()].substring(0,3)} ${String(dObj.getDate()).padStart(2,'0')}/${String(dObj.getMonth()+1).padStart(2,'0')}</div><div class="flex h-[30px]">${[0,6,12,18].map(h=>`<div class="hour-tick flex items-center justify-center text-[8px] font-bold border-r" style="width:${currentZoom*6}px">${h.toString().padStart(2,'0')}h</div>`).join('')}</div>`;
                header.appendChild(group);
            }
            document.getElementById('timeline-grid').style.width = `calc(var(--day-w) * ${totalDays})`; render();
        }

        window.scrollToDate = function(iso, start = "08:00") { const diff = getDaysSinceStart(iso); const [h, m] = start.split(':').map(Number); const target = (diff * 24 * currentZoom) + ((h + m/60) * currentZoom) - 350; document.getElementById('gantt-scroll-parent').scrollTo({ left: target, behavior: 'smooth' }); };
        window.triggerPulse = function(id) { const el = document.getElementById(`task-${id}`); if(el) { el.classList.add('pulse-active'); setTimeout(()=>el.classList.remove('pulse-active'), 3000); } };
        window.toggleDrawer = function(date) { collapsedDates.has(date) ? collapsedDates.delete(date) : collapsedDates.add(date); render(); };
        window.setActiveFilter = function(f) { activeFilter = f; render(); };

        function render() {
            const list = document.getElementById('sidebar-list'); const labels = document.getElementById('timeline-labels'); const grid = document.getElementById('timeline-grid');
            labels.innerHTML = ''; grid.innerHTML = ''; list.innerHTML = ''; generateFilterBubbles();

            const renderChips = (id, fn, cl) => { const c = document.getElementById(id); const items = works.filter(fn); c.innerHTML = items.length ? items.map(w => `<div onclick="scrollToDate('${w.date}', '${w.start}'); triggerPulse('${w.id}')" class="row-item-chip ${cl} cursor-pointer border px-3 py-1 rounded text-[10px] font-bold">${w.code}</div>`).join('') : '<span class="text-[9px] text-slate-300 italic px-2">Vazio</span>'; };
            renderChips('row-reprogram', w => w.status === 'reprogramar', 'border-l-slate-400');
            renderChips('row-finished', w => w.status === 'finished', 'border-l-emerald-400');
            renderChips('row-pending', w => w.status === 'pending', 'border-l-orange-400');

            let filtered = works;
            if(activeFilter==='finished') filtered = works.filter(w=>w.status==='finished');
            else if(activeFilter==='pending') filtered = works.filter(w=>w.status==='pending');
            else if(activeFilter==='reprogramar') filtered = works.filter(w=>w.status==='reprogramar');
            else if(TEAMS.includes(activeFilter)) filtered = works.filter(w=>w.team===activeFilter);

            const grouped = {}; filtered.sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start)).forEach(w => { if(!grouped[w.date]) grouped[w.date]=[]; grouped[w.date].push(w); });
            Object.keys(grouped).sort().forEach(d => {
                const header = document.createElement('div'); header.className = 'sidebar-card bg-slate-50 dark:bg-slate-800/50 flex justify-between font-bold text-slate-500 text-[10px] py-2 px-4 border-b dark:border-slate-700 cursor-pointer'; header.onclick = () => toggleDrawer(d); header.innerHTML = `<span>📅 ${isoToBR(d)}</span><span>${grouped[d].length} OBRAS</span>`; list.appendChild(header);
                if(!collapsedDates.has(d)) grouped[d].forEach(w => {
                    const card = document.createElement('div'); card.className = `sidebar-card border-b p-4 cursor-pointer ${w.status==='pending'?'card-pending':'card-finished'}`; card.onclick = () => { scrollToDate(w.date, w.start); triggerPulse(w.id); };
                    card.innerHTML = `<div class="flex justify-between items-start group"><div class="flex-1"><p class="font-extrabold text-sm uppercase dark:text-slate-200">${w.code}</p><p class="text-[10px] font-bold text-slate-400 uppercase">${w.start} - ${w.team}</p>${w.us ? `<p class="text-[10px] font-black text-blue-500 mt-1">${w.us} US</p>` : ''}</div><div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><button onclick="toggleWork(${w.id},'${w.code}',event)" class="bg-white dark:bg-slate-700 p-2 border dark:border-slate-600 rounded-lg text-emerald-500"><i data-lucide="check" class="w-4 h-4"></i></button><button onclick="toggleModal('edit',${w.id})" class="bg-white dark:bg-slate-700 p-2 border dark:border-slate-600 rounded-lg text-slate-400"><i data-lucide="pencil" class="w-4 h-4"></i></button></div></div>`;
                    list.appendChild(card);
                });
            });

            TEAMS.forEach(t => {
                const lb = document.createElement('div'); lb.className = 'gantt-label-cell flex items-center px-4 font-bold border-b'; lb.style.height = '40px'; lb.innerText = t; labels.appendChild(lb);
                const row = document.createElement('div'); row.className = 'gantt-data-row relative border-b'; row.style.height = '40px';
                works.filter(i => i.team === t && i.status !== 'reprogramar').forEach(item => {
                    const diff = getDaysSinceStart(item.date); if(diff >= 0) {
                        const [sh, sm] = item.start.split(':').map(Number); const [eh, em] = item.end.split(':').map(Number);
                        const l = (diff * 24 * currentZoom) + ((sh + sm/60) * currentZoom); const w = ((eh+em/60)-(sh+sm/60)) * currentZoom;
                        const block = document.createElement('div'); block.className = `task-bar ${item.status==='finished'?'task-red':(t==='BB30'?'task-orange':'task-purple')}`;
                        block.id = `task-${item.id}`; block.style.left = `${l}px`; block.style.width = `${Math.max(w, 40)}px`; block.innerHTML = `<span class="truncate">${item.code}</span>`; 
                        block.onclick = (e) => { e.stopPropagation(); openOverview(item.id); }; row.appendChild(block);
                    }
                });
                grid.appendChild(row);
            });
            lucide.createIcons();
        }

        function generateFilterBubbles() { const c = document.getElementById('filter-bubbles-container'); const btns = [{id:'all',l:'Todas'},{id:'finished',l:'Apontadas'},{id:'pending',l:'Aguardando'}]; c.innerHTML = btns.map(b => `<div onclick="setActiveFilter('${b.id}')" class="filter-bubble cursor-pointer px-3 py-1 rounded text-[10px] font-bold ${activeFilter===b.id?'active bg-blue-500 text-white':'bg-slate-100 dark:bg-slate-800 text-slate-500'}">${b.l}</div>`).join('') + `<div class="w-px h-5 bg-slate-100 dark:bg-slate-700 mx-1"></div>` + TEAMS.map(t => `<div onclick="setActiveFilter('${t}')" class="filter-bubble cursor-pointer px-3 py-1 rounded text-[10px] font-bold ${activeFilter===t?'active bg-blue-500 text-white':'bg-slate-100 dark:bg-slate-800 text-slate-500'}">${t}</div>`).join(''); }
        window.toggleModal = function(mode='add', id=null) {
            const m = document.getElementById('modal'); const main = document.getElementById('modal-main-content'); const settings = document.getElementById('modal-settings-content');
            m.classList.replace('hidden', 'flex'); main.classList.add('hidden'); settings.classList.add('hidden');
            if (mode === 'settings') { document.getElementById('modal-title').innerText = "Configurações"; settings.classList.remove('hidden'); document.getElementById('modal-confirm-btn').style.display = "none"; }
            else {
                main.classList.remove('hidden'); document.getElementById('modal-confirm-btn').style.display = "block";
                if(mode==='edit') {
                    const item = works.find(w=>w.id == id); editingId = id; document.getElementById('m-code').value = item.code; document.getElementById('m-date').value = item.date; document.getElementById('m-us').value = item.us || ''; document.getElementById('m-start').value = item.start; document.getElementById('m-end').value = item.end; document.getElementById('m-comment').value = item.comment || ''; generateTeamToggles([item.team]); document.getElementById('modal-title').innerText = "Editar Obra"; document.getElementById('modal-primary-btn').innerText = "SALVAR ALTERAÇÕES"; document.getElementById('modal-primary-btn').onclick = saveEdit; document.getElementById('modal-confirm-btn').style.display = "none"; document.getElementById('batch-table-container').classList.add('hidden');
                } else {
                    editingId = null; tempItems = []; document.getElementById('m-code').value = ''; document.getElementById('m-date').value = getISODateLocal(); document.getElementById('m-us').value = ''; document.getElementById('m-comment').value = ''; generateTeamToggles(["BB30"]); document.getElementById('modal-title').innerText = "Lançamento"; document.getElementById('modal-primary-btn').innerText = "ADICIONAR À FILA"; document.getElementById('modal-primary-btn').onclick = addItem; document.getElementById('batch-table-container').classList.remove('hidden'); updateTempList();
                }
            }
            lucide.createIcons();
        };

        window.saveEdit = function() { if(!editingId) return; const idx = works.findIndex(w => w.id == editingId); if(idx > -1) { works[idx].code = document.getElementById('m-code').value.trim().toUpperCase(); works[idx].date = document.getElementById('m-date').value; works[idx].us = document.getElementById('m-us').value; works[idx].start = document.getElementById('m-start').value; works[idx].end = document.getElementById('m-end').value; works[idx].comment = document.getElementById('m-comment').value; const ts = getSelectedTeams(); if(ts.length) works[idx].team = ts[0]; saveData(); closeModal(); render(); } };
        window.addItem = function() { const code = document.getElementById('m-code').value.trim().toUpperCase(); const date = document.getElementById('m-date').value; const teams = getSelectedTeams(); if(!code || !date || teams.length === 0) return; teams.forEach(t => tempItems.push({ id: Date.now()+Math.random(), code, date, team: t, us: document.getElementById('m-us').value, start: document.getElementById('m-start').value, end: document.getElementById('m-end').value, comment: document.getElementById('m-comment').value, status: 'pending' })); document.getElementById('m-code').value = ''; updateTempList(); };
        window.updateTempList = function() { const t = document.getElementById('temp-table'); t.innerHTML = tempItems.map(item => `<tr class="border-b dark:border-slate-800"><td class="p-3 font-bold dark:text-slate-200">${item.code}</td><td class="p-3 font-bold text-blue-500">${item.team}</td><td class="p-3 text-right"><button onclick="tempItems=tempItems.filter(x=>x.id!==${item.id});updateTempList();" class="text-red-400 font-bold">Remover</button></td></tr>`).join(''); document.getElementById('modal-confirm-btn').disabled = tempItems.length === 0; };
        window.finalize = function() { tempItems.forEach(ni => { const idx = works.findIndex(w => w.code === ni.code && w.status === 'reprogramar'); if(idx !== -1) works.splice(idx, 1); }); works = [...works, ...tempItems]; saveData(); closeModal(); render(); };

        window.toggleWork = function(id, code, event) { if(event) event.stopPropagation(); const w = works.find(x => x.id == id); if(w.status==='finished') { works=works.map(x=>x.id==id?{...x,status:'pending'}:x); saveData(); render(); } else openStatusModal(id, 'finished', `Finalizar ${code}`); };
        window.openStatusModal = function(id, st, desc) { document.getElementById('modal-status').classList.replace('hidden', 'flex'); document.getElementById('status-modal-desc').innerText = desc; document.getElementById('status-confirm-btn').onclick = () => { works = works.map(x => x.id == id ? {...x, status: st, comment: document.getElementById('status-m-comment').value.trim() || x.comment} : x); saveData(); render(); closeStatusModal(); }; };
        window.openOverview = function(id) {
            const item = works.find(w => w.id == id); if (!item) return;
            document.getElementById('ov-code').innerText = item.code; document.getElementById('ov-time').innerText = `${item.start} - ${item.end}`; document.getElementById('ov-us').innerText = item.us ? `${item.us} US` : '--'; document.getElementById('ov-comment').innerText = item.comment || "Sem notas registradas."; document.getElementById('ov-teams-tags').innerText = item.team;
            const [y, m, d] = item.date.split('-'); const dObj = new Date(y, m-1, d); document.getElementById('ov-date').innerText = `${WEEKDAYS[dObj.getDay()]}, ${d}/${m}/${y}`;
            const btn = document.getElementById('ov-toggle-btn'); const btnRepro = document.getElementById('ov-repro-btn'); const txt = document.getElementById('ov-status-text'); const dot = document.getElementById('ov-status-dot');
            if (item.status === 'finished') { dot.style.backgroundColor = "#10b981"; txt.innerText = "Apontada"; btn.innerText = "REVERTER"; btnRepro.classList.add('hidden'); } else { dot.style.backgroundColor = "#f97316"; txt.innerText = "Pendente"; btn.innerText = "FINALIZAR"; btnRepro.classList.remove('hidden'); }
            document.getElementById('ov-edit-btn').onclick = () => { closeOverview(); toggleModal('edit', id); }; btnRepro.onclick = () => { closeOverview(); setReprogramar(id, item.code); }; btn.onclick = () => { closeOverview(); toggleWork(id, item.code); };
            document.getElementById('modal-overview').classList.replace('hidden', 'flex'); lucide.createIcons();
        };

        window.handleWorkSearch = function(q) { const div = document.getElementById('search-results'); if(!q || q.length < 2) { div.style.display='none'; return; } const filtered = works.filter(w => w.code.toLowerCase().includes(q.toLowerCase())).slice(0, 8); div.innerHTML = filtered.map(w => `<div class="search-result-item p-3 border-b dark:border-slate-800 flex justify-between cursor-pointer dark:text-slate-200" onclick="scrollToDate('${w.date}','${w.start}'); triggerPulse('${w.id}'); document.getElementById('search-results').style.display='none';"><span>${w.code}</span><span class="text-blue-500 font-bold text-[10px] uppercase">${w.team}</span></div>`).join(''); div.style.display = filtered.length ? 'block' : 'none'; };
        function generateTeamToggles(selected = []) { document.getElementById('team-toggles-container').innerHTML = TEAMS.map(t => `<div onclick="this.classList.toggle('active')" class="team-toggle ${selected.includes(t) ? 'active' : ''}">${t}</div>`).join(''); }
        function getSelectedTeams() { return Array.from(document.querySelectorAll('.team-toggle.active')).map(el => el.innerText); }
        window.closeOverview = function() { document.getElementById('modal-overview').classList.replace('flex', 'hidden'); };
        window.closeStatusModal = function() { document.getElementById('modal-status').classList.replace('flex', 'hidden'); };
        window.closeModal = function() { document.getElementById('modal').classList.replace('flex', 'hidden'); };
        window.setReprogramar = function(id, code) { openStatusModal(id, 'reprogramar', `Reprogramar ${code}`); };

        window.onload = init;
    </script>
</body>
</html>
